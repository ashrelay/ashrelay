name: Generate Pacman

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate pacman
        uses: huangziwei/pacman-contribution-graph@v1
        with:
          github_username: ashrelay
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Grayscale palette — dots go from dark grey to light grey
          dot_color_level_0: "111111"
          dot_color_level_1: "333333"
          dot_color_level_2: "555555"
          dot_color_level_3: "888888"
          dot_color_level_4: "bbbbbb"
          background_color: "0d0d0d"
          pacman_color: "ffffff"

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
